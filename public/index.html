<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dentist Clinic Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #eef3f6;
      --sidebar: #030712;
      --sidebar-soft: rgba(255,255,255,.075);
      --card: #ffffff;
      --border: #dbe3ea;
      --text: #111827;
      --muted: #64748b;
      --faint: #94a3b8;
      --teal: #14b8a6;
      --cyan: #0ea5e9;
      --blue: #2563eb;
      --amber: #f59e0b;
      --red: #ef4444;
      --green: #10b981;
      --radius: 10px;
      --radius-sm: 7px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body { margin: 0; min-height: 100vh; display: flex; background: var(--bg); color: var(--text); font-size: 14px; }
    button { font: inherit; }
    .sidebar { width: 280px; flex: 0 0 280px; height: 100vh; position: sticky; top: 0; background: var(--sidebar); color: #fff; display: flex; flex-direction: column; overflow-y: auto; }
    .brand { padding: 18px 14px 16px; border-bottom: 1px solid rgba(255,255,255,.08); }
    .brand img { width: 248px; max-width: 100%; display: block; object-fit: contain; }
    .brand small { display: none; }
    .nav-section { padding: 16px 10px 2px; }
    .nav-label { padding: 0 10px 7px; color: rgba(255,255,255,.35); text-transform: uppercase; font-size: 10px; letter-spacing: 1px; font-weight: 800; }
    .nav-item { width: 100%; border: 0; display: flex; align-items: center; gap: 10px; padding: 9px 10px; color: rgba(255,255,255,.68); background: transparent; border-radius: var(--radius-sm); cursor: pointer; text-align: left; font-size: 13px; font-weight: 650; }
    .nav-item:hover, .nav-item.active { background: var(--sidebar-soft); color: #fff; }
    .nav-item.active { box-shadow: inset 3px 0 0 var(--teal); }
    .nav-icon { width: 19px; text-align: center; color: #67e8f9; }
    .nav-badge { margin-left: auto; color: #fff; background: var(--red); border-radius: 999px; font-size: 10px; padding: 1px 7px; }
    .sidebar-bottom { margin-top: auto; padding: 14px 10px; border-top: 1px solid rgba(255,255,255,.08); }
    .agent { display: flex; gap: 10px; align-items: center; padding: 10px; background: var(--sidebar-soft); border-radius: var(--radius-sm); }
    .agent-dot { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--teal), var(--blue)); display: grid; place-items: center; font-weight: 900; }
    .agent-title { font-weight: 800; font-size: 12px; }
    .agent-sub { color: #5eead4; font-size: 11px; margin-top: 2px; }
    .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 18px; }
    .top-title { font-size: 20px; font-weight: 850; letter-spacing: 0; }
    .top-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .top-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .pill { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 5px 10px; font-size: 11px; font-weight: 800; border: 1px solid rgba(20,184,166,.24); color: #0f766e; background: rgba(20,184,166,.09); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 4px rgba(16,185,129,.12); }
    .btn { border: 1px solid var(--border); background: #f8fafc; color: #334155; border-radius: var(--radius-sm); padding: 7px 12px; cursor: pointer; font-size: 12px; font-weight: 800; }
    .btn.primary { border-color: #0f766e; background: var(--teal); color: #fff; }
    .content { padding: 20px 24px 28px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
    .stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .stat-card, .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); }
    .stat-card { padding: 16px; display: flex; gap: 13px; align-items: center; }
    .stat-icon { width: 42px; height: 42px; border-radius: 10px; display: grid; place-items: center; color: #fff; font-weight: 900; flex: 0 0 42px; }
    .stat-label { color: var(--muted); font-size: 11.5px; font-weight: 700; }
    .stat-value { font-size: 24px; font-weight: 900; line-height: 1.1; margin-top: 2px; }
    .stat-delta { font-size: 11px; margin-top: 3px; font-weight: 800; }
    .up { color: var(--green); } .neutral { color: var(--muted); } .down { color: var(--red); }
    .grid-wide { display: grid; grid-template-columns: 1.65fr 1fr; gap: 12px; }
    .grid-three { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .card-head { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .card-title { font-weight: 850; font-size: 13.5px; }
    .card-sub { color: var(--muted); font-size: 11.5px; margin-top: 2px; }
    .card-body { padding: 14px 16px; }
    .live-card { border-color: rgba(20,184,166,.32); background: linear-gradient(135deg, #fff, #effffd); }
    .wave { display: flex; align-items: center; gap: 3px; height: 24px; }
    .wave span { width: 3px; border-radius: 4px; background: var(--teal); animation: wave 1.1s ease-in-out infinite; }
    .wave span:nth-child(1) { height: 8px; } .wave span:nth-child(2) { height: 18px; animation-delay: .1s; } .wave span:nth-child(3) { height: 24px; animation-delay: .2s; } .wave span:nth-child(4) { height: 12px; animation-delay: .3s; } .wave span:nth-child(5) { height: 20px; animation-delay: .15s; }
    @keyframes wave { 50% { transform: scaleY(.35); opacity: .45; } }
    .caller { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
    .avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--cyan), var(--teal)); color: #fff; display: grid; place-items: center; font-weight: 900; }
    .caller-name { font-weight: 900; }
    .caller-phone { color: var(--muted); font-size: 12px; margin-top: 1px; }
    .timer { margin-left: auto; text-align: right; color: var(--blue); font-size: 24px; font-weight: 900; }
    .timer small { display: block; color: var(--muted); font-size: 10px; font-weight: 700; }
    .tag { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 999px; background: rgba(14,165,233,.11); color: #0369a1; font-size: 10.5px; font-weight: 850; margin-top: 6px; }
    .transcript { border: 1px solid var(--border); background: #f8fafc; border-radius: var(--radius-sm); padding: 10px 12px; color: #475569; line-height: 1.55; font-size: 12.5px; }
    .mini { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid var(--border); }
    .mini div { padding: 11px 12px; text-align: center; border-right: 1px solid var(--border); }
    .mini div:last-child { border-right: 0; }
    .mini strong { display: block; font-size: 16px; }
    .mini span { display: block; color: var(--muted); font-size: 10.5px; margin-top: 2px; }
    .queue-item, .appt, .perf { display: flex; align-items: center; gap: 10px; }
    .queue-item { padding: 9px 0; border-bottom: 1px solid var(--border); }
    .queue-item:last-child { border-bottom: 0; }
    .num { width: 22px; height: 22px; border-radius: 50%; background: #e2e8f0; color: #475569; display: grid; place-items: center; font-size: 11px; font-weight: 900; flex: 0 0 22px; }
    .queue-name, .appt-name { font-weight: 850; font-size: 12.5px; }
    .queue-wait, .appt-detail { color: var(--muted); font-size: 11px; margin-top: 1px; }
    .queue-reason { margin-left: auto; font-size: 10px; font-weight: 850; color: #475569; background: #f1f5f9; border: 1px solid var(--border); padding: 3px 7px; border-radius: 999px; white-space: nowrap; }
    .chart-bars { height: 118px; display: flex; align-items: end; gap: 8px; padding-top: 8px; }
    .bar { flex: 1; min-width: 10px; border-radius: 6px 6px 3px 3px; background: linear-gradient(180deg, var(--cyan), var(--teal)); }
    .donut-wrap { display: flex; align-items: center; gap: 16px; }
    .donut { width: 100px; height: 100px; border-radius: 50%; flex: 0 0 100px; position: relative; }
    .donut::after { content: ""; position: absolute; inset: 22px; background: #fff; border-radius: 50%; border: 1px solid var(--border); }
    .legend { flex: 1; display: grid; gap: 8px; }
    .legend-row { display: flex; align-items: center; gap: 7px; font-size: 12px; }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 9px; }
    .legend-label { color: var(--muted); flex: 1; }
    .legend-value { font-weight: 900; }
    .trend { height: 118px; display: flex; align-items: end; gap: 8px; }
    .trend-day { flex: 1; display: flex; gap: 3px; align-items: end; height: 100%; }
    .trend-day span { flex: 1; border-radius: 5px 5px 2px 2px; min-height: 10px; }
    .trend-day .patients { background: var(--cyan); }
    .trend-day .bookings { background: var(--green); }
    .appt { padding: 9px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: #f8fafc; margin-bottom: 7px; }
    .appt-time { min-width: 48px; text-align: center; border-radius: 7px; border: 1px solid var(--border); background: #fff; padding: 5px 7px; }
    .appt-time strong { display: block; color: var(--blue); font-size: 12px; }
    .appt-time span { color: var(--muted); font-size: 9px; font-weight: 800; }
    .appt-main { min-width: 0; flex: 1; }
    .appt-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .appt-chip { display: inline-flex; align-items: center; border: 1px solid var(--border); background: #fff; color: var(--muted); border-radius: 999px; padding: 2px 7px; font-size: 10px; font-weight: 800; }
    .appt-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .appt-transcript { margin: -2px 0 8px 58px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: #fff; padding: 10px 12px; color: #475569; line-height: 1.5; font-size: 12px; }
    .appt-transcript a { color: #0369a1; font-weight: 800; }
    .status { margin-left: auto; font-size: 10px; font-weight: 900; padding: 3px 7px; border-radius: 999px; white-space: nowrap; background: rgba(20,184,166,.11); color: #0f766e; }
    .status.pending { background: rgba(245,158,11,.13); color: #b45309; }
    .status.booked { background: rgba(14,165,233,.11); color: #0369a1; }
    .perf { margin-bottom: 13px; display: block; }
    .perf-top { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
    .perf-label { color: var(--muted); font-weight: 750; }
    .perf-value { font-weight: 900; }
    .perf-bg { height: 7px; background: #edf2f7; border-radius: 999px; overflow: hidden; }
    .perf-fill { height: 100%; border-radius: 999px; }
    table { width: 100%; border-collapse: collapse; }
    th { color: var(--faint); text-align: left; text-transform: uppercase; letter-spacing: .6px; font-size: 10.5px; padding: 0 12px 9px; border-bottom: 1px solid var(--border); }
    td { padding: 11px 12px; border-bottom: 1px solid var(--border); font-size: 12.5px; }
    tr:last-child td { border-bottom: 0; }
    .patient { font-weight: 850; }
    .muted { color: var(--muted); }
    .outcome { font-size: 10.5px; border-radius: 999px; padding: 3px 8px; font-weight: 900; display: inline-block; background: #eef2ff; color: #3730a3; }
    .loading { min-height: 100vh; display: grid; place-items: center; color: var(--muted); font-weight: 800; }
    .view-head { display: flex; align-items: center; justify-content: space-between; gap: 14px; }
    .view-title { font-size: 18px; font-weight: 900; }
    .view-sub { margin-top: 3px; color: var(--muted); font-size: 12px; font-weight: 650; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .field { display: grid; gap: 6px; }
    .field label { color: var(--muted); font-size: 11px; font-weight: 850; text-transform: uppercase; letter-spacing: .4px; }
    .field input, .field select, .field textarea { width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 11px; font: inherit; color: var(--text); background: #fff; }
    .field textarea { min-height: 96px; resize: vertical; grid-column: 1 / -1; }
    .backend-result { grid-column: 1 / -1; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 11px; background: #f8fafc; color: var(--muted); font-size: 12px; line-height: 1.5; min-height: 42px; }
    .backend-result.ok { border-color: rgba(20,184,166,.32); background: #effffd; color: #0f766e; }
    .backend-result.error { border-color: rgba(239,68,68,.26); background: #fff5f5; color: #b91c1c; }
    .transcript-row td { background: #f8fafc; padding-top: 0; }
    .transcript-panel { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 12px; color: #475569; line-height: 1.55; white-space: normal; }
    .transcript-panel strong { color: var(--text); }
    .room-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .room { border: 1px solid var(--border); border-radius: var(--radius); background: #fff; padding: 14px; }
    .room-name { font-weight: 900; }
    .room-status { color: var(--muted); font-size: 12px; margin-top: 5px; }
    .room-meter { height: 7px; background: #e2e8f0; border-radius: 999px; margin-top: 12px; overflow: hidden; }
    .room-meter span { display: block; height: 100%; background: var(--teal); border-radius: 999px; }
    @media (max-width: 1120px) { .stats { grid-template-columns: repeat(2, 1fr); } .grid-three { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 820px) { body { display: block; } .sidebar { width: 100%; height: auto; position: relative; } .brand img { width: 150px; } .grid-wide, .grid-three, .form-grid, .room-grid { grid-template-columns: 1fr; } .topbar { align-items: flex-start; flex-direction: column; } .top-actions { margin-left: 0; flex-wrap: wrap; } }
    @media (max-width: 560px) { .content, .topbar { padding-left: 14px; padding-right: 14px; } .stats { grid-template-columns: 1fr; } .donut-wrap { align-items: flex-start; flex-direction: column; } .sidebar .nav-section { padding-top: 10px; } }
    @media (prefers-reduced-motion: reduce) { .wave span { animation: none; } }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <img src="/assets/synkris-logo.png" alt="Synkris">
      <small>Intelligence in Sync</small>
    </div>
    <nav>
      <section class="nav-section">
        <div class="nav-label">Clinic</div>
        <button class="nav-item active" data-view="overview"><span class="nav-icon">OV</span>Overview</button>
        <button class="nav-item" data-view="schedule"><span class="nav-icon">SC</span>Schedule</button>
        <button class="nav-item" data-view="calls"><span class="nav-icon">CA</span>Patient Calls<span class="nav-badge">3</span></button>
        <button class="nav-item" data-view="booking"><span class="nav-icon">NB</span>New Booking</button>
      </section>
      <section class="nav-section">
        <div class="nav-label">Patients</div>
        <button class="nav-item" data-view="patients"><span class="nav-icon">PR</span>Patient Records</button>
        <button class="nav-item" data-view="insurance"><span class="nav-icon">$</span>Insurance</button>
        <button class="nav-item" data-view="followups"><span class="nav-icon">FU</span>Follow-ups<span class="nav-badge">5</span></button>
      </section>
      <section class="nav-section">
        <div class="nav-label">Operations</div>
        <button class="nav-item" data-view="rooms"><span class="nav-icon">TR</span>Treatment Rooms</button>
        <button class="nav-item" data-view="analytics"><span class="nav-icon">AN</span>Analytics</button>
        <button class="nav-item" data-view="settings"><span class="nav-icon">AI</span>AI Settings</button>
      </section>
    </nav>
    <div class="sidebar-bottom">
      <div class="agent">
        <div class="agent-dot">AI</div>
        <div>
          <div class="agent-title">Synkris Dental AI</div>
          <div class="agent-sub">Live and answering</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <div class="top-title" id="clinicTitle">Dentist Clinic Dashboard</div>
        <div class="top-sub" id="clinicSubtitle">Connected to backend</div>
      </div>
      <div class="top-actions">
        <span class="pill"><span class="dot"></span><span id="statusText">LIVE</span></span>
        <button class="btn" id="refreshBtn">Refresh</button>
        <button class="btn primary" id="newAppointmentBtn">New Appointment</button>
      </div>
    </header>

    <div class="content" id="dashboard">
      <div class="loading">Loading dental clinic data...</div>
    </div>
  </main>

  <script>
    const API_URL = "/api/dental-dashboard";
    const BACKEND_HEALTH_URL = "/api/backend/health";
    const BACKEND_CONFIG_URL = "/api/backend/config";
    const BACKEND_WEBHOOK_URL = "/api/backend/webhook";
    const colors = ["#14b8a6", "#0ea5e9", "#2563eb", "#f59e0b", "#ef4444"];
    const iconMap = { users: "PT", calendar: "AP", activity: "CH", sparkles: "AI" };

    const fallbackData = {
      clinic: { name: "Dentist Clinic Dashboard", location: "Local demo mode", aiAgent: "Synkris Dental AI", status: "Offline Demo" },
      stats: [
        { label: "Patients Today", value: "38", delta: "+12% vs yesterday", trend: "up", icon: "users" },
        { label: "Appointments Booked", value: "24", delta: "+6 new online", trend: "up", icon: "calendar" },
        { label: "Chair Utilization", value: "86%", delta: "4 rooms active", trend: "neutral", icon: "activity" },
        { label: "AI Resolution", value: "93%", delta: "+2.4% this week", trend: "up", icon: "sparkles" }
      ],
      activeCall: { patient: "Dr James Smith", phone: "+1 (415) 882-3047", reason: "Tooth pain consultation", timer: "02:47", transcript: "I can book an urgent dental exam for 11:30 AM today or 9:00 AM tomorrow. Which works better for you?", bookingRate: "78%", intentMatch: "96%", fallbackRate: "5%" },
      queue: [{ name: "Michael Lee", wait: "0:42", reason: "Cleaning reschedule" }, { name: "New Patient", wait: "1:16", reason: "Implant inquiry" }, { name: "Sara Mitchell", wait: "2:03", reason: "Insurance question" }],
      appointments: [{ time: "9:00", meridiem: "AM", name: "Daniel Reeves", service: "Routine Cleaning", room: "Room 2", status: "Confirmed" }],
      treatments: [{ label: "Cleanings", value: 12, color: "#14b8a6" }, { label: "Emergency", value: 7, color: "#ef4444" }, { label: "Cosmetic", value: 6, color: "#0ea5e9" }, { label: "Restorative", value: 9, color: "#f59e0b" }],
      hourlyVolume: [8, 14, 18, 12, 22, 19, 16, 24],
      weekTrend: { labels: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"], patients: [31, 34, 29, 36, 41, 38, 22], bookings: [18, 20, 17, 23, 26, 24, 12] },
      performance: [{ label: "Missed calls recovered", value: "91%", percent: 91, color: "#14b8a6" }],
      recentIntake: [{ patient: "Mina Patel", phone: "+1 (415) 220-1309", reason: "New patient cleaning", outcome: "Booked", owner: "AI" }]
    };

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;" }[char]));
    }

    async function getDashboard() {
      try {
        const response = await fetch(API_URL, { headers: { "Accept": "application/json" } });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } catch (error) {
        console.warn("Using fallback dashboard data:", error);
        return fallbackData;
      }
    }

    async function getBackendHealth() {
      try {
        const response = await fetch(BACKEND_HEALTH_URL, { headers: { "Accept": "application/json" } });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } catch (error) {
        return { status: "error", message: error.message };
      }
    }

    async function getBackendConfig() {
      try {
        const response = await fetch(BACKEND_CONFIG_URL, { headers: { "Accept": "application/json" } });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } catch (error) {
        return { status: "error", message: error.message, treatment_types: [], practitioners: [] };
      }
    }

    async function callBackend(functionName, args) {
      const response = await fetch(`${BACKEND_WEBHOOK_URL}/${functionName}`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify({ args })
      });
      const body = await response.json();
      if (!response.ok) throw new Error(body.message || `HTTP ${response.status}`);
      return body;
    }

    function renderStats(stats) {
      return `<section class="stats">${stats.map((stat, index) => `
        <article class="stat-card">
          <div class="stat-icon" style="background:${colors[index % colors.length]}">${escapeHtml(iconMap[stat.icon] || "--")}</div>
          <div>
            <div class="stat-label">${escapeHtml(stat.label)}</div>
            <div class="stat-value">${escapeHtml(stat.value)}</div>
            <div class="stat-delta ${escapeHtml(stat.trend || "neutral")}">${escapeHtml(stat.delta)}</div>
          </div>
        </article>`).join("")}</section>`;
    }

    function renderActiveCall(call) {
      return `<article class="card live-card">
        <div class="card-head">
          <div><div class="card-title">Active Patient Call</div><div class="card-sub">AI receptionist is handling this live</div></div>
          <div class="wave"><span></span><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="card-body">
          <div class="caller">
            <div class="avatar">${escapeHtml((call.patient || "P").slice(0, 1))}</div>
            <div>
              <div class="caller-name">${escapeHtml(call.patient)}</div>
              <div class="caller-phone">${escapeHtml(call.phone)}</div>
              <div class="tag">${escapeHtml(call.reason)}</div>
            </div>
            <div class="timer">${escapeHtml(call.timer)}<small>In progress</small></div>
          </div>
          <div class="transcript"><strong>Synkris:</strong> "${escapeHtml(call.transcript)}"</div>
        </div>
        <div class="mini">
          <div><strong style="color:var(--green)">${escapeHtml(call.bookingRate)}</strong><span>Booking Rate</span></div>
          <div><strong style="color:var(--blue)">${escapeHtml(call.intentMatch)}</strong><span>Intent Match</span></div>
          <div><strong style="color:var(--amber)">${escapeHtml(call.fallbackRate)}</strong><span>Fallback</span></div>
        </div>
      </article>`;
    }

    function renderQueue(queue) {
      return `<article class="card">
        <div class="card-head"><div><div class="card-title">Call Queue</div><div class="card-sub">${queue.length} patients waiting</div></div><button class="btn">Manage</button></div>
        <div class="card-body">${queue.map((item, index) => `
          <div class="queue-item">
            <div class="num">${index + 1}</div>
            <div><div class="queue-name">${escapeHtml(item.name)}</div><div class="queue-wait">${escapeHtml(item.wait)} wait</div></div>
            <div class="queue-reason">${escapeHtml(item.reason)}</div>
          </div>`).join("")}</div>
      </article>`;
    }

    function renderBars(values) {
      const max = Math.max(...values, 1);
      return `<div class="chart-bars">${values.map(value => `<div class="bar" title="${value}" style="height:${Math.max(12, (value / max) * 100)}%"></div>`).join("")}</div>`;
    }

    function renderTreatments(treatments) {
      const total = treatments.reduce((sum, item) => sum + item.value, 0) || 1;
      let start = 0;
      const hasValues = treatments.some(item => item.value > 0);
      const segments = hasValues ? treatments.map(item => {
        const end = start + (item.value / total) * 100;
        const part = `${item.color} ${start}% ${end}%`;
        start = end;
        return part;
      }).join(", ") : "#e2e8f0 0% 100%";
      return `<article class="card">
        <div class="card-head"><div><div class="card-title">Treatment Mix</div><div class="card-sub">Backend calls by treatment</div></div></div>
        <div class="card-body">
          <div class="donut-wrap">
            <div class="donut" style="background:conic-gradient(${segments})"></div>
            <div class="legend">${treatments.map(item => `<div class="legend-row"><span class="legend-dot" style="background:${item.color}"></span><span class="legend-label">${escapeHtml(item.label)}</span><span class="legend-value">${item.value}</span></div>`).join("")}</div>
          </div>
        </div>
      </article>`;
    }

    function renderTrend(trend) {
      const max = Math.max(...trend.patients, ...trend.bookings, 1);
      return `<div class="trend">${trend.labels.map((label, index) => `
        <div class="trend-day" title="${escapeHtml(label)}">
          <span class="patients" style="height:${Math.max(10, (trend.patients[index] / max) * 100)}%"></span>
          <span class="bookings" style="height:${Math.max(10, (trend.bookings[index] / max) * 100)}%"></span>
        </div>`).join("")}</div>`;
    }

    function renderAppointments(appointments, options = {}) {
      const showCallTools = Boolean(options.showCallTools);
      const title = options.title || "Today's Appointments";
      const subtitle = options.subtitle || `${appointments.length} backend appointment records`;
      return `<article class="card">
        <div class="card-head"><div><div class="card-title">${escapeHtml(title)}</div><div class="card-sub">${escapeHtml(subtitle)}</div></div><button class="btn">View All</button></div>
        <div class="card-body">${appointments.map(item => {
          const statusClass = item.status === "Pending" ? "pending" : ["Just Booked", "Backend Booked", "Call Booked"].includes(item.status) ? "booked" : "";
          const transcriptId = item.callId ? `schedule-${item.callId}` : "";
          return `<div class="appt">
            <div class="appt-time"><strong>${escapeHtml(item.time)}</strong><span>${escapeHtml(item.meridiem)}</span></div>
            <div class="appt-main">
              <div class="appt-name">${escapeHtml(item.name)}</div>
              <div class="appt-detail">${escapeHtml(item.service)} | ${escapeHtml(item.room)}</div>
              ${showCallTools ? `<div class="appt-meta">
                <span class="appt-chip">${escapeHtml(item.date || "Date from call")}</span>
                <span class="appt-chip">${escapeHtml(item.source || "Backend")}</span>
                <span class="appt-chip">${escapeHtml(item.confidence || "Backend confirmed")}</span>
              </div>` : ""}
            </div>
            <div class="appt-actions">
              ${showCallTools && item.transcript ? `<button class="btn" type="button" data-transcript="${escapeHtml(transcriptId)}">View Transcript</button>` : ""}
              <div class="status ${statusClass}">${escapeHtml(item.status)}</div>
            </div>
          </div>${showCallTools && item.transcript ? `<div class="appt-transcript" data-transcript-row="${escapeHtml(transcriptId)}" hidden><strong>Transcript:</strong> ${escapeHtml(item.transcript)}${item.recordingUrl ? `<div style="margin-top:10px"><a href="${escapeHtml(item.recordingUrl)}" target="_blank" rel="noreferrer">Open recording</a></div>` : ""}</div>` : ""}`;
        }).join("")}</div>
      </article>`;
    }

    function renderPerformance(items) {
      return `<article class="card">
        <div class="card-head"><div><div class="card-title">AI Receptionist Performance</div><div class="card-sub">Dental front desk automation</div></div></div>
        <div class="card-body">${items.map(item => `<div class="perf">
          <div class="perf-top"><span class="perf-label">${escapeHtml(item.label)}</span><span class="perf-value">${escapeHtml(item.value)}</span></div>
          <div class="perf-bg"><div class="perf-fill" style="width:${Number(item.percent) || 0}%; background:${escapeHtml(item.color)}"></div></div>
        </div>`).join("")}</div>
      </article>`;
    }

    function renderTable(rows) {
      return `<article class="card">
        <div class="card-head"><div><div class="card-title">Recent Patient Intake</div><div class="card-sub">Latest calls and web requests</div></div></div>

          <table>
            <thead><tr><th>Patient</th><th>Phone</th><th>Reason</th><th>Outcome</th><th>Owner</th></tr></thead>

              <td class="muted">${escapeHtml(row.phone)}</td>
              <td>${escapeHtml(row.reason)}</td>
              <td><span class="outcome">${escapeHtml(row.outcome)}</span></td>
              <td class="muted">${escapeHtml(row.owner)}</td>

          </table>
        </div>

    function renderPatientRecords(rows = []) {

        <div class="card-head"><div><div class="card-title">Backend Patient Records</div><div class="card-sub">${rows.length} profiles from Supabase calls and PMS data</div></div></div>
        <div class="card-body" style="overflow-x:auto">

            <tbody>${rows.length ? rows.map(row => {
              const transcriptId = row.callId ? `patient-${row.callId}` : "";

                <td class="muted">${escapeHtml(row.phone)}</td>
                <td>${escapeHtml(row.reason)}</td>
                <td><span class="outcome">${escapeHtml(row.outcome)}</span></td>

    function renderCallHistory(calls = []) {

          <article class="stat-card"><div class="stat-icon" style="background:var(--teal)">1st</div><div><div class="stat-label">First Appointment</div><div class="stat-value">${escapeHtml(first.time || "--")}</div><div class="stat-delta neutral">${escapeHtml(first.service || "No booking")} ${escapeHtml(first.meridiem || "")}</div></div></article>
          <article class="stat-card"><div class="stat-icon" style="background:var(--amber)">SL</div><div><div class="stat-label">Open Backend Slots</div><div class="stat-value">${escapeHtml(summary.openSlots ?? 0)}</div><div class="stat-delta neutral">Available from webhook</div></div></article>
          <article class="stat-card"><div class="stat-icon" style="background:var(--blue)">Last</div><div><div class="stat-label">Last Appointment</div><div class="stat-value">${escapeHtml(last.time || "--")}</div><div class="stat-delta up">${escapeHtml(last.service || "No booking")} ${escapeHtml(last.meridiem || "")}</div></div></article>

              <div class="field"><label>Treatment</label><select name="treatment_key">${treatments.map(item => `<option value="${escapeHtml(item.key)}">${escapeHtml(item.name)}</option>`).join("")}</select></div>

              <div class="field"><label>From Date</label><input type="date" name="date_from" value="2026-06-15" required></div>

          <article class="card"><div class="card-head"><div><div class="card-title">7-Day Trend</div><div class="card-sub">Patients vs bookings</div></div></div><div class="card-body">${renderTrend(data.weekTrend)}</div></article>

    function renderCurrentView() {
      if (!currentData) return;
      const view = currentView;
      const content = {
        overview: renderOverview,
        schedule: renderSchedule,
        calls: renderCalls,
        booking: renderBooking,
        patients: renderPatients,
        insurance: renderInsurance,
        followups: renderFollowups,
        rooms: renderRooms,
        analytics: renderAnalytics,
        settings: renderSettings
      }[view](currentData);
      document.getElementById("dashboard").innerHTML = content;
      document.querySelectorAll("[data-action='booking']").forEach(button => {
        button.addEventListener("click", () => setView("booking"));
      });
      document.querySelectorAll("[data-transcript]").forEach(button => {
        button.addEventListener("click", () => {
          const row = document.querySelector(`[data-transcript-row="${CSS.escape(button.dataset.transcript)}"]`);
          if (!row) return;
          row.hidden = !row.hidden;
          button.textContent = row.hidden ? "View Transcript" : "Hide Transcript";
        });
      });
      const bookingForm = document.getElementById("bookingForm");
      if (bookingForm) {
        const resultBox = document.getElementById("bookingResult");
        const formPayload = () => {
          const form = new FormData(bookingForm);
          return {
            first_name: form.get("first_name"),
            last_name: form.get("last_name"),
            dob: form.get("dob"),
            phone: form.get("phone"),
            treatment_key: form.get("treatment_key"),
            practitioner_id: form.get("practitioner_id") || null,
            date_from: form.get("date_from"),
            date_to: form.get("date_to")
          };
        };
        const setBookingResult = (message, type = "") => {
          resultBox.className = `backend-result ${type}`;
          resultBox.textContent = message;
        };
        const checkSlots = async () => {
          const payload = formPayload();
          setBookingResult("Checking backend availability...");
          const availability = await callBackend("check_availability", {
            treatment_key: payload.treatment_key,
            practitioner_id: payload.practitioner_id,
            date_from: payload.date_from,
            date_to: payload.date_to
          });
          if (availability.status !== "ok" || !availability.slots.length) {
            setBookingResult("No backend slots found for that request.", "error");
            return null;
          }
          const slot = availability.slots[0];
          setBookingResult(`First slot: ${slot.start} with ${slot.practitioner_name}`, "ok");
          return slot;
        };
        document.getElementById("checkSlotsBtn").addEventListener("click", async () => {
          try {
            await checkSlots();
          } catch (error) {
            setBookingResult(error.message, "error");
          }
        });
        bookingForm.addEventListener("submit", async event => {
          event.preventDefault();
          try {
            const payload = formPayload();
            const slot = await checkSlots();
            if (!slot) return;
            const booking = await callBackend("book_appointment", {
              patient: {
                first_name: payload.first_name,
                last_name: payload.last_name,
                dob: payload.dob,
                phone: payload.phone
              },
              treatment_key: payload.treatment_key,
              practitioner_id: slot.practitioner_id,
              start: slot.start
            });
            setBookingResult(`${booking.message} Appointment ID: ${booking.appointment_id}`, "ok");
          } catch (error) {
            setBookingResult(error.message, "error");
          }
        });
      }
    }

    function setView(view) {
      currentView = view;
      document.querySelectorAll(".nav-item").forEach(nav => {
        nav.classList.toggle("active", nav.dataset.view === view);
      });
      renderCurrentView();
    }

    let currentData = null;
    let currentView = "overview";
    let backendHealth = { status: "unknown" };
    let backendConfig = { treatment_types: [], practitioners: [] };

    async function render() {
      const [data, health, config] = await Promise.all([getDashboard(), getBackendHealth(), getBackendConfig()]);
      currentData = data;
      backendHealth = health;
      backendConfig = config.status === "ok" ? config : { treatment_types: [], practitioners: [] };
      document.getElementById("clinicTitle").textContent = data.clinic.name || "Dentist Clinic Dashboard";
      document.getElementById("clinicSubtitle").textContent = `${data.clinic.location || "Dental clinic"} | Backend ${backendHealth.status === "ok" ? "connected" : "offline"}`;
      document.getElementById("statusText").textContent = backendHealth.status === "ok" ? "BACKEND LIVE" : "DASHBOARD LIVE";
      renderCurrentView();
    }

    document.getElementById("refreshBtn").addEventListener("click", render);
    document.getElementById("newAppointmentBtn").addEventListener("click", () => setView("booking"));
    document.querySelectorAll(".nav-item").forEach(item => {
      item.addEventListener("click", () => {
        setView(item.dataset.view);
      });
    });
    render();
  </script>
</body>
</html>
